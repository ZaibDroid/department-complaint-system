</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1.5">TO</label>
<div class="relative">
<input class="w-full bg-surface-gray border border-border-subtle rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-container focus:border-transparent outline-none transition-all font-body-md text-on-background" type="date" value="2023-10-31"/>

</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-secondary-fixed-variant py-1 px-4 hover:bg-surface-container-high rounded-xl transition-colors">

<script>
        // Micro-interactions for chip selection
        document.querySelectorAll('.selectable-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                chip.classList.toggle('border-primary-container');
                chip.classList.toggle('bg-primary-container/5');
            });
        });

        // Simple mock for "Reset" functionality
        const resetBtn = document.querySelector('header button:last-child');
        resetBtn.addEventListener('click', () => {
            if(confirm('Are you sure you want to reset all filters?')) {
                window.location.reload();
            }
        });
    </script>
