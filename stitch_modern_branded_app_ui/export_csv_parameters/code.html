        selectAllBtn.addEventListener('click', () => {
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            checkboxes.forEach(cb => cb.checked = !allChecked);
        });

        // Toggle visual feedback for radios
        document.querySelectorAll('input[name="range"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Tailwind CSS Peer and has() handled automatically in modern browsers
                // Just keeping this hook for potential additional logic
            });
        });

        // Simple ripple effect simulator
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', function() {
                this.style.transform = 'scale(0.98)';
            });
            btn.addEventListener('mouseup', function() {
                this.style.transform = 'scale(1)';
            });
